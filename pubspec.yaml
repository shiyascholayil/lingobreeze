name: lingobreeze
description: LingoBreeze - Learn Languages
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  # Networking
  dio: ^5.3.2
  retrofit: ^4.0.1
  logger: ^1.4.0

  # Dependency Injection
  get_it: ^7.6.0

  # UI
  flutter_svg: ^2.0.7
  google_fonts: ^5.1.0

  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  retrofit_generator: ^7.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
